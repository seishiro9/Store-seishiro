<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Seishiro Store | All Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0c, #010101);
            font-family: 'Inter', sans-serif;
            color: #F0F0F0;
            padding: 1.5rem 1rem 3rem;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Partikel animasi halus */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 210, 100, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 210, 100, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255,200,100,0.08) 0%, rgba(0,0,0,0) 60%);
            animation: slowRotate 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .glass-card {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 210, 100, 0.25);
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        /* Profile Header dengan animasi border avatar */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 2rem;
            padding: 0.8rem 1.5rem;
            flex-wrap: wrap;
        }

        .avatar-wrapper {
            position: relative;
            width: 70px;
            height: 70px;
        }

        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #F5B041, #FFD966);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            position: relative;
            z-index: 2;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Animasi ripple di sekeliling avatar */
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 220, 100, 0.4), transparent 70%);
            animation: pulseRing 2s infinite ease-out;
            z-index: 1;
        }

        @keyframes pulseRing {
            0% {
                transform: scale(0.9);
                opacity: 0.8;
            }
            70% {
                transform: scale(1.2);
                opacity: 0;
            }
            100% {
                transform: scale(0.9);
                opacity: 0;
            }
        }

        /* Centang elegan */
        .verified-badge {
            position: absolute;
            bottom: 2px;
            right: 0px;
            background: linear-gradient(145deg, #1E88E5, #0a5d9e);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0a0a0a;
            box-shadow: 0 0 8px rgba(30,136,229,0.6);
            z-index: 3;
        }

        .verified-badge i {
            font-size: 13px;
            color: white;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
        }

        .store-name h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF8E7, #FFE2A4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .store-name .verified-icon {
            background: linear-gradient(145deg, #1E88E5, #0e5a9c);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 6px #1E88E5;
        }

        .store-name .verified-icon i {
            font-size: 13px;
            color: white;
        }

        .social-links {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .social-icon {
            background: rgba(25, 25, 35, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.7rem;
            border: 1px solid rgba(255, 200, 100, 0.4);
            transition: all 0.2s;
            cursor: pointer;
            color: #FFE2B5;
        }

        .social-icon:hover {
            background: #FFD96630;
            transform: translateY(-2px);
            border-color: #ffcd7e;
        }

        /* Kategori */
        .category-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 80px;
            padding: 0.8rem 1rem;
            margin-bottom: 2rem;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        .cat-btn {
            background: linear-gradient(135deg, rgba(20, 20, 28, 0.9), rgba(10, 10, 16, 0.95));
            border: 1px solid rgba(255, 200, 90, 0.4);
            border-radius: 60px;
            padding: 0.7rem 1.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            color: #FFE5B4;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .cat-btn.active {
            background: linear-gradient(125deg, #F5B041, #FFD966);
            color: #0a0a0a;
            border-color: #FFE5A3;
            box-shadow: 0 4px 15px rgba(255, 200, 0, 0.3);
            transform: translateY(-2px);
        }

        /* Grid produk */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .product-item {
            padding: 1rem;
            transition: 0.25s;
            border-radius: 1.5rem;
            background: rgba(18, 18, 24, 0.6);
            border: 1px solid rgba(255, 210, 100, 0.2);
        }

        .product-item:hover {
            transform: translateY(-5px);
            background: rgba(35, 35, 45, 0.8);
            border-color: #ffcd7e;
            box-shadow: 0 15px 25px -12px rgba(0,0,0,0.5);
        }

        .product-img {
            position: relative;
            width: 100%;
            padding-top: 75%;
            background: #0c0c10;
            border-radius: 1.2rem;
            overflow: hidden;
            margin-bottom: 0.8rem;
            border: 1px solid rgba(255, 210, 100, 0.3);
            cursor: pointer;
        }

        .product-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0a0a0a;
            transition: transform 0.3s;
        }

        .product-img:hover img {
            transform: scale(1.02);
        }

        .product-img::after {
            content: "\f00e";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            bottom: 10px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #FFD966;
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            opacity: 0;
            transition: 0.2s;
        }

        .product-img:hover::after {
            opacity: 1;
        }

        .product-badge {
            background: #ffcd6e20;
            display: inline-block;
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.65rem;
            border: 0.5px solid #ffcd7e;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 800;
            margin: 0.3rem 0;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 800;
            color: #FFDF8C;
        }

        .product-desc {
            font-size: 0.7rem;
            opacity: 0.8;
            margin: 0.3rem 0;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 0.6rem;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7rem;
            background: #232323;
            border: 1px solid rgba(255, 200, 100, 0.5);
            border-radius: 40px;
            color: #FFE6B3;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            transition: 0.15s;
        }

        .btn-sm:hover {
            background: #3a3a3a;
            transform: scale(0.97);
        }

        .btn-buy-sm {
            background: linear-gradient(95deg, #E2A526, #FFC857);
            color: #0F0F0F;
            border: none;
            font-weight: 800;
        }

        .dynamic-section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1.3rem;
            padding: 1rem;
            margin: 1.2rem 0;
            border-left: 4px solid #ffcd6e;
        }

        .payment-area {
            padding: 1rem;
        }

        .method-list {
            background: #0c0c0f66;
            border-radius: 1rem;
            padding: 0.4rem;
        }

        .method-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255, 210, 100, 0.2);
        }

        .qris-block {
            background: #FFD96620;
            border-radius: 1rem;
            text-align: center;
            padding: 0.6rem;
            margin-top: 8px;
            border: 1px dashed #ffcd7e;
            cursor: pointer;
            transition: 0.2s;
        }

        .qris-block:hover {
            background: #FFD96640;
        }

        .proof-section {
            margin-top: 16px;
            background: #00000040;
            border-radius: 1rem;
            padding: 0.7rem;
        }

        .proof-img canvas {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #ffcd7e;
            cursor: pointer;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px 14px;
            background: #1c1b20;
            border: 1px solid #5a5340;
            border-radius: 28px;
            color: white;
            margin-top: 4px;
            font-size: 0.8rem;
        }

        label {
            font-weight: 500;
            margin-top: 8px;
            display: block;
            color: #FFE2B5;
            font-size: 0.75rem;
        }

        .text-gold {
            color: #ffd966;
        }

        /* Modal zoom gambar produk */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            z-index: 1200;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .image-modal-content {
            max-width: 85vw;
            max-height: 85vh;
            background: #111;
            border-radius: 28px;
            padding: 8px;
            border: 2px solid #ffcd7e;
        }

        .image-modal-content img {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
        }

        .close-modal-img {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: #FFD966;
            background: rgba(0, 0, 0, 0.6);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Music Player */
        .music-float {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #1f1d2b, #121016);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 999;
            box-shadow: 0 0 0 2px rgba(255, 210, 100, 0.4);
            color: #FFD966;
            transition: 0.1s;
        }

        .music-float.playing {
            animation: pulseGlow 1.2s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(255, 205, 100, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(255, 205, 100, 0); }
        }

        .music-tooltip {
            position: absolute;
            bottom: 65px;
            right: 0;
            background: #1e1c1aee;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            white-space: nowrap;
            color: #ffeaaf;
            pointer-events: none;
            opacity: 0;
            transition: 0.2s;
        }

        .music-float:hover .music-tooltip {
            opacity: 1;
        }

        @media (max-width: 750px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e1c1a;
            padding: 15px;
            border-radius: 28px;
            border: 2px solid #ffcd7e;
            text-align: center;
        }

        .close-modal {
            background: #ffd966;
            color: #1f1c16;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            margin: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
